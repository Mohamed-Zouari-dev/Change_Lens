name: Build and Publish Production Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-release:
    name: Build Python Wheel and Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyPA Build System Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Compile Distribution Artifacts
        working-directory: ./changelens  # 👈 Tells GitHub to step into the nested project folder
        run: |
          python -m build

      - name: Publish Artifacts to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            changelens/dist/*.whl
            changelens/dist/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}